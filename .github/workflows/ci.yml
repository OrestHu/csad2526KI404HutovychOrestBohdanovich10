name: CMake CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Run CI (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: ci.cmd

      - name: Run CI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./ci.sh

      - name: Deploy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ github.run_id }}
          path: build
          if-no-files-found: warn
